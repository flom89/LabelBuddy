{% extends "base.html" %}

{% block content %}

<div class="flex justify-start items-start p-8 md:p-12">
    <div class="w-full max-w-md">
        <div class="mb-8">
            <h2 class="text-xl font-bold text-white flex items-center gap-2">
                <span class="w-1.5 h-6 bg-bambu-green rounded-full"></span>
                System Configuration
            </h2>
            <p class="text-sm text-gray-500 mt-2">Connect your dashboard to the BamBuddy API.</p>
        </div>

        <form id="config-form"
              hx-post="/save-config"
              hx-target="#form-status"
              hx-swap="innerHTML"
              hx-indicator="#loading-spinner"
              class="space-y-6">

            <div class="bambu-card p-6 shadow-xl relative">
                <div id="loading-spinner" class="htmx-indicator absolute inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-10 rounded-xl">
                    <div class="animate-spin h-6 w-6 border-2 border-bambu-green border-t-transparent rounded-full"></div>
                </div>

                <div class="space-y-5 text-left">
                    <div>
                        <label for="bambuddy_url" class="block text-[10px] uppercase font-bold text-gray-500 mb-2 tracking-widest">
                            BamBuddy Instance URL
                        </label>
                        <input
                            type="url"
                            id="bambuddy_url"
                            name="bambuddy_url"
                            value="{{ current_url }}"
                            placeholder="https://bambuddy.local"
                            required
                            class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white outline-none focus:border-bambu-green transition-all placeholder:text-gray-700"
                        >
                    </div>

                    <div>
                        <label for="api_token" class="block text-[10px] uppercase font-bold text-gray-500 mb-2 tracking-widest flex justify-between">
                            <span>API Access Token</span>
                            {% if token_exists %}
                                <span class="text-bambu-green lowercase font-medium tracking-normal opacity-80">✓ already configured</span>
                            {% endif %}
                        </label>
                        <input
                            type="password"
                            id="api_token"
                            name="api_token"
                            placeholder="{% if token_exists %}•••••••••••••••• (saved){% else %}Enter token...{% endif %}"
                            class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white outline-none focus:border-bambu-green transition-all placeholder:text-gray-600"
                        >
                        {% if token_exists %}
                            <p class="text-[9px] text-gray-500 mt-2 italic text-left">
                                Leave this field blank to keep the current token.
                            </p>
                        {% endif %}
                    </div>
                </div>
            </div>

            <div id="form-status"></div>

            <div class="flex justify-start">
                <button
                    type="submit"
                    class="bg-bambu-green hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed text-black font-bold px-8 py-3 rounded-lg transition-all shadow-lg active:scale-95 flex items-center gap-2 group"
                >
                    <span class="text-lg group-active:rotate-12 transition-transform">💾</span>
                    <span>Save Configuration</span>
                </button>
            </div>
        </form>

        <div class="mt-6 ml-1 flex gap-2 items-start opacity-50">
            <div class="w-4 h-4 rounded-full border border-bambu-green flex items-center justify-center flex-shrink-0">
                <span class="text-bambu-green text-[10px] font-bold font-mono italic">i</span>
            </div>
            <p class="text-[11px] text-gray-400">
                Your data is stored encrypted on the server.
            </p>
        </div>
    </div>
</div>

<style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: flex; }

    /* Disable button during request */
    .htmx-request button[type="submit"] {
        pointer-events: none;
        opacity: 0.6;
    }
</style>

{% endblock %}
